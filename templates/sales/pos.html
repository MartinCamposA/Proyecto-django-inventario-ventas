{% extends "base.html" %}
{% load static %}

{% block title %}Caja — POS System{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/pos.js' %}"></script>
{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">

    <!-- ── COLUMNA IZQUIERDA: Scanner ── -->
    <div class="lg:col-span-2 flex flex-col gap-4">

        <!-- Input para pistola de código de barras -->
        <div class="bg-white rounded-xl shadow p-4">
            <h2 class="text-lg font-bold text-gray-700 mb-3">
                🔫 Escanear Producto
            </h2>
            <form hx-post="{% url 'sales:add_to_cart' %}"
                  hx-target="#cart-container"
                  hx-swap="outerHTML"
                  hx-on::after-request="this.reset(); document.getElementById('sku-input').focus()">
                {% csrf_token %}
                <div class="flex gap-2">
                    <input
                        type="text"
                        id="sku-input"
                        name="sku"
                        autofocus
                        autocomplete="off"
                        placeholder="Escanea o escribe el código de barras..."
                        class="flex-1 border-2 border-blue-300 rounded-lg px-4 py-3
                               text-lg focus:outline-none focus:border-blue-500
                               focus:ring-2 focus:ring-blue-200 transition"
                    >
                    <button type="submit"
                            class="bg-blue-600 text-white px-6 py-3 rounded-lg
                                   font-bold hover:bg-blue-700 transition">
                        Agregar
                    </button>
                </div>
            </form>
        </div>

        <!-- Último producto escaneado -->
        <div id="last-scanned"
             class="bg-white rounded-xl shadow p-4 min-h-20
                    flex items-center justify-center text-gray-400">
            <p>El último producto escaneado aparecerá aquí...</p>
        </div>
    </div>

    <!-- ── COLUMNA DERECHA: Carrito ── -->
    <div class="lg:col-span-1">
        {% include "sales/partials/cart.html" %}
    </div>

</div>

<!-- ── MODAL DE PAGO ── -->
<div id="payment-modal-container"
     class="hidden fixed inset-0 z-50
            bg-black bg-opacity-60
            flex items-center justify-center"
     onclick="cerrarModal()">
</div>
{% endblock %}
