{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="text-center px-4">

        <!-- Código de error -->
        <h1 class="text-9xl font-black text-blue-500 opacity-20 select-none">
            404
        </h1>

        <!-- Ícono -->
        <div class="text-6xl -mt-8 mb-4">🔍</div>

        <!-- Mensaje -->
        <h2 class="text-2xl font-bold text-white mb-2">
            Página no encontrada
        </h2>
        <p class="text-gray-400 mb-8 max-w-md mx-auto">
            La página que buscas no existe o fue movida.
            Verifica la URL e intenta nuevamente.
        </p>

        <!-- Botones -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/ventas/caja/"
               class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold
                      hover:bg-blue-700 transition">
                🛒 Ir a la Caja
            </a>
            <a href="/reportes/"
               class="bg-gray-700 text-white px-6 py-3 rounded-lg font-bold
                      hover:bg-gray-600 transition">
                📊 Ver Reportes
            </a>
        </div>

        <!-- Info extra -->
        <p class="text-gray-600 text-sm mt-8">
            POS System — Error 404
        </p>

    </div>
</body>
</html>
