{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-4">

        <!-- Logo / Título -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">💼</div>
            <h1 class="text-3xl font-bold text-white">POS System</h1>
            <p class="text-gray-400 mt-2">Ingresa tus credenciales para continuar</p>
        </div>

        <!-- Card del formulario -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">

            <!-- Errores -->
            {% if form.errors %}
                <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
                    <p class="text-red-600 font-medium text-sm">
                        ⚠ Usuario o contraseña incorrectos. Intenta nuevamente.
                    </p>
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <!-- Usuario -->
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        👤 Usuario
                    </label>
                    <input
                        type="text"
                        name="username"
                        autofocus
                        autocomplete="username"
                        placeholder="Ingresa tu usuario"
                        class="w-full border-2 border-gray-200 rounded-lg px-4 py-3
                               text-gray-800 focus:outline-none focus:border-blue-500
                               focus:ring-2 focus:ring-blue-100 transition"
                    >
                </div>

                <!-- Contraseña -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        🔒 Contraseña
                    </label>
                    <input
                        type="password"
                        name="password"
                        autocomplete="current-password"
                        placeholder="Ingresa tu contraseña"
                        class="w-full border-2 border-gray-200 rounded-lg px-4 py-3
                               text-gray-800 focus:outline-none focus:border-blue-500
                               focus:ring-2 focus:ring-blue-100 transition"
                    >
                </div>

                <!-- Botón -->
                <button
                    type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold
                           text-lg hover:bg-blue-700 transition">
                    Ingresar al Sistema
                </button>

                <!-- Redirigir después del login -->
                <input type="hidden" name="next" value="{{ next }}">
            </form>

        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6">
            Sistema de Punto de Venta
        </p>

    </div>

</body>
</html>
